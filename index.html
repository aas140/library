<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <dialog id="mydialog">
        <button class="close" command = "close" commandfor = "mydialog">x</button>
        <form action="">
            <div>
                <label for="title">Title</label>
                <input type="text" id="title" name="bookTitle">
            </div>
            <div>
                <label for="author">Author</label>
                <input type="text" id="author" name="bookAuthor" required>
            </div>
            <div>
                <label for="pages">Pages</label>
                <input type="number" id="pages" name="bookPages" required>
            </div>
            <div>
                <label for="read">Read</label>
                <input type="radio" id="read" name="haveread" required>
            </div>
            <button type="submit" class="save-book">Save</button>

        </form>
    </dialog>
    <button class="addBtn">New Book</button>
    <ul class="list">

    </ul>
    <script src="script.js"></script>
</body>
</html>
